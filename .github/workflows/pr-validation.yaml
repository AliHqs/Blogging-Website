name: wf-dev-lint
on:
  pull_request:
    branches:
      - develop
jobs:
  linting-job:
    runs-on: ubuntu-latest
    steps:
      - name: Chckout Repo
        uses: actions/checkout@v4
      - name: Lint html and css files
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
  build-job:
    needs: linting-job
    runs-on: ubuntu-latest
    steps:
      - name: Chckout Repository
        uses: actions/checkout@v4
      - name: Build Website
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
